<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBoard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#10121c;
  --sidebar:#0c0e1a;
  --surface:#181b2e;
  --surface2:#1f2236;
  --border:#272b45;
  --border2:#323760;
  --text:#dde2ff;
  --text2:#7c83b8;
  --text3:#4a5088;
  --accent:#5b7cff;
  --accent-dim:#2d3d8c;
  --green:#00c875;--green-dim:#0a3d26;
  --yellow:#fdbc64;--yellow-dim:#3d2e10;
  --red:#e2445c;--red-dim:#3d1220;
  --orange:#ff7b29;--orange-dim:#3d2008;
  --purple:#a25ddc;--purple-dim:#2d1845;
  --teal:#03c9d0;--teal-dim:#062e30;
  --gray:#676f9d;--gray-dim:#1e2035;
  --row-hover:#1c2040;
  --header-h:54px;
  --sidebar-w:240px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* SCROLLBARS */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* TOP NAV */
#topnav{height:var(--header-h);background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:17px;color:var(--text);letter-spacing:-0.3px;min-width:calc(var(--sidebar-w) - 32px)}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.nav-sep{flex:1}
.nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
.nav-btn:hover{background:var(--border);color:var(--text)}
.nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-btn.primary:hover{background:#4a6ef5;border-color:#4a6ef5}
/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
#sidebar{width:var(--sidebar-w);background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-section{padding:8px 0}
.sidebar-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:8px 16px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 8px;border-radius:7px;cursor:pointer;font-size:13.5px;color:var(--text2);transition:background .12s,color .12s;position:relative}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--accent-dim);color:var(--accent)}
.sb-item .sb-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-item .sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item .sb-count{font-size:11px;background:var(--surface2);padding:1px 6px;border-radius:10px;color:var(--text3)}
.sb-item.active .sb-count{background:var(--accent-dim);color:var(--accent)}
.sidebar-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* BOARD HEADER */
#board-header{padding:16px 24px 0;flex-shrink:0}
.board-title-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.board-icon-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:2px;border-radius:5px}
.board-icon-btn:hover{background:var(--surface2)}
.board-name-input{background:none;border:none;font-size:21px;font-weight:600;color:var(--text);font-family:inherit;outline:none;flex:1;letter-spacing:-0.3px}
.board-name-input:focus{border-bottom:2px solid var(--accent)}
.board-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:7px 14px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;border-radius:5px 5px 0 0;user-select:none}
.tab:hover{color:var(--text);background:var(--surface)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:none}
/* TOOLBAR */
#toolbar{padding:10px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tool-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;background:none;border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.tool-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.tool-btn svg{width:14px;height:14px;flex-shrink:0}
/* BOARD CONTENT */
#board-content{flex:1;overflow:auto;padding:0 24px 40px}
/* GROUP */
.group{margin-bottom:28px}
.group-header{display:flex;align-items:center;gap:0;margin-bottom:0;position:sticky;top:0;z-index:10;background:var(--bg);padding:6px 0 0}
.group-color{width:4px;border-radius:2px;align-self:stretch;margin-right:8px;flex-shrink:0}
.group-toggle{background:none;border:none;color:var(--text3);cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center;transition:color .12s}
.group-toggle:hover{color:var(--text2)}
.group-name-input{background:none;border:none;font-size:14px;font-weight:600;color:var(--text);font-family:inherit;outline:none;padding:3px 6px;border-radius:4px;min-width:60px}
.group-name-input:hover{background:var(--surface2)}
.group-name-input:focus{background:var(--surface2);outline:1px solid var(--accent)}
.group-count{font-size:12px;color:var(--text3);padding:2px 7px;background:var(--surface);border-radius:10px;margin-left:4px}
.group-actions{display:flex;gap:2px;margin-left:4px;opacity:0;transition:opacity .15s}
.group-header:hover .group-actions{opacity:1}
.g-action-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;display:flex;align-items:center;transition:color .12s}
.g-action-btn:hover{color:var(--text);background:var(--surface2)}
.group-spacer{flex:1}
.group-add-col{font-size:12px;color:var(--text3);cursor:pointer;padding:4px 10px;border:1px dashed var(--border);border-radius:6px;transition:all .12s}
.group-add-col:hover{color:var(--accent);border-color:var(--accent)}
/* TABLE */
.group-table{width:100%;border-collapse:collapse;min-width:700px}
/* COL HEADERS */
.col-headers{background:var(--surface);position:sticky;top:36px;z-index:9}
.col-headers th{padding:7px 10px;font-size:11.5px;font-weight:500;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;user-select:none;letter-spacing:.02em;text-transform:uppercase}
.col-headers th:first-child{border-left:3px solid transparent;padding-left:30px;min-width:260px}
.col-headers th:last-child{border-right:none;width:36px}
/* ROWS */
.item-row{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
.item-row:hover{background:var(--row-hover)}
.item-row td{padding:0;border-right:1px solid var(--border);vertical-align:middle;height:38px}
.item-row td:last-child{border-right:none}
.item-row td:first-child{border-left:3px solid transparent}
/* CHECKBOX COL */
.cell-check{width:36px;text-align:center;padding:0 8px!important}
.cb{width:15px;height:15px;border:1.5px solid var(--border2);border-radius:4px;cursor:pointer;appearance:none;background:none;transition:all .12s;vertical-align:middle}
.cb:checked{background:var(--accent);border-color:var(--accent)}
.cb:checked::after{content:'✓';display:block;font-size:10px;color:#fff;text-align:center;line-height:13px}
/* NAME CELL */
.cell-name{min-width:260px}
.name-wrap{display:flex;align-items:center;gap:6px;padding:0 8px 0 10px}
.row-drag{color:var(--text3);opacity:0;cursor:grab;font-size:12px;padding:2px}
.item-row:hover .row-drag{opacity:1}
.name-input{background:none;border:none;font-size:13.5px;color:var(--text);font-family:inherit;outline:none;flex:1;padding:4px 4px;border-radius:4px;cursor:pointer}
.name-input:focus{background:var(--surface2);cursor:text;outline:1px solid var(--accent)}
.open-btn{background:none;border:none;color:var(--text3);cursor:pointer;opacity:0;padding:3px;border-radius:4px;display:flex;align-items:center;transition:opacity .12s,color .12s}
.item-row:hover .open-btn{opacity:1}
.open-btn:hover{color:var(--accent)}
/* STATUS CELL */
.cell-status{width:130px;text-align:center}
.status-badge{display:inline-block;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:filter .12s;min-width:80px;text-align:center}
.status-badge:hover{filter:brightness(1.1)}
/* PRIORITY CELL */
.cell-priority{width:110px;text-align:center}
.priority-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:filter .12s}
.priority-badge:hover{filter:brightness(1.1)}
.priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* DATE CELL */
.cell-date{width:120px}
.date-input{background:none;border:none;font-size:13px;color:var(--text2);font-family:'DM Mono',monospace;cursor:pointer;padding:6px 10px;width:100%;outline:none;border-radius:4px}
.date-input::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer}
.date-input:focus{background:var(--surface2);color:var(--text)}
.date-overdue{color:var(--red)!important}
/* OWNER CELL */
.cell-owner{width:130px}
.owner-wrap{display:flex;align-items:center;gap:6px;padding:4px 10px}
.owner-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.owner-input{background:none;border:none;font-size:13px;color:var(--text2);font-family:inherit;outline:none;flex:1;cursor:pointer;padding:2px 4px;border-radius:4px;min-width:0}
.owner-input:focus{background:var(--surface2);cursor:text;color:var(--text);outline:1px solid var(--accent)}
/* NOTES CELL */
.cell-notes{width:180px}
.notes-input{background:none;border:none;font-size:12.5px;color:var(--text3);font-family:inherit;outline:none;width:100%;padding:6px 10px;cursor:pointer}
.notes-input:focus{background:var(--surface2);color:var(--text2);cursor:text;outline:1px solid var(--accent)}
/* ADD ROW */
.add-row td{padding:0;border-right:none;border-bottom:1px solid var(--border)}
.add-item-btn{display:flex;align-items:center;gap:7px;padding:7px 10px 7px 22px;background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;font-family:inherit;width:100%;text-align:left;transition:color .12s,background .12s;border-radius:0}
.add-item-btn:hover{color:var(--accent);background:var(--surface)}
/* ADD GROUP */
.add-group-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;background:none;border:1px dashed var(--border);border-radius:8px;color:var(--text3);font-size:13.5px;cursor:pointer;font-family:inherit;margin-top:8px;transition:all .15s}
.add-group-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--surface)}
/* ROW ACTIONS */
.cell-actions{width:36px;text-align:center}
.row-action-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;opacity:0;display:flex;align-items:center;justify-content:center;transition:color .12s}
.item-row:hover .row-action-btn{opacity:1}
.row-action-btn:hover{color:var(--red);background:var(--red-dim)}
/* DROPDOWN MENU */
.dropdown{position:fixed;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;min-width:160px;padding:4px;animation:fadeIn .1s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dd-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text);transition:background .1s}
.dd-item:hover{background:var(--border)}
.dd-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.dd-sep{height:1px;background:var(--border);margin:4px 0}
/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:10000;display:flex;align-items:center;justify-content:center;animation:fadeInB .15s ease}
@keyframes fadeInB{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;min-width:360px;max-width:520px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.6)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
.modal-row{margin-bottom:14px}
.modal-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.modal-row input,.modal-row select,.modal-row textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none}
.modal-row input:focus,.modal-row select:focus,.modal-row textarea:focus{border-color:var(--accent)}
.modal-row select option{background:var(--surface2)}
.modal-row textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.modal-cancel{background:none;border:1px solid var(--border2);color:var(--text2);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .12s}
.modal-cancel:hover{background:var(--surface2);color:var(--text)}
.modal-ok{background:var(--accent);border:1px solid var(--accent);color:#fff;padding:8px 18px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .12s}
.modal-ok:hover{background:#4a6ef5}
/* ITEM DETAIL */
.item-detail{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:28px;min-width:460px;max-width:620px;width:93%;box-shadow:0 16px 48px rgba(0,0,0,.65)}
.detail-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:22px}
.detail-title-input{background:none;border:none;font-size:20px;font-weight:600;color:var(--text);font-family:inherit;outline:none;flex:1;line-height:1.3}
.detail-title-input:focus{border-bottom:2px solid var(--accent)}
.detail-close{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;transition:color .12s}
.detail-close:hover{color:var(--text);background:var(--surface2)}
.detail-fields{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.detail-field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;font-weight:500}
.detail-field select,.detail-field input[type=text],.detail-field input[type=date]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-family:inherit;font-size:13.5px;outline:none;cursor:pointer}
.detail-field select:focus,.detail-field input:focus{border-color:var(--accent)}
.detail-field select option{background:var(--surface2)}
.detail-notes-full{grid-column:span 2}
.detail-notes-full textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:13.5px;outline:none;resize:vertical;min-height:90px}
.detail-notes-full textarea:focus{border-color:var(--accent)}
/* SEARCH */
.search-bar{position:relative;display:flex;align-items:center}
.search-bar input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 12px 6px 32px;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:200px;transition:width .2s,border-color .15s}
.search-bar input:focus{border-color:var(--accent);width:260px}
.search-bar svg{position:absolute;left:9px;color:var(--text3);pointer-events:none}
/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}
/* COLLAPSED GROUP */
.group.collapsed .group-table-wrap{display:none}
/* COLOR PICKER */
.color-swatch-row{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0}
.color-swatch{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.sel{border-color:#fff}
/* PROGRESS BAR ON GROUP */
.group-progress{display:flex;gap:2px;height:5px;border-radius:3px;overflow:hidden;margin-left:8px;min-width:60px}
.gp-seg{height:100%;transition:width .3s}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:12px 18px;font-size:13.5px;color:var(--text);box-shadow:0 6px 20px rgba(0,0,0,.4);z-index:99999;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* SCROLLABLE TABLE WRAPPER */
.group-table-wrap{overflow-x:auto}
</style>
</head>
<body>

<div id="topnav">
  <div class="logo">
    <div class="logo-mark">W</div>
    WorkBoard
  </div>
  <div style="flex:1;display:flex;align-items:center;gap:8px;padding-left:16px">
    <div class="search-bar">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search items..." id="global-search" oninput="handleSearch(this.value)">
    </div>
  </div>
  <button class="nav-btn primary" onclick="showNewBoardModal()">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Board
  </button>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="sidebar-section" style="padding-top:14px">
      <div class="sidebar-label">Workspace</div>
      <div class="sb-item" onclick="showView('all')" id="sb-all">
        <span class="sb-icon">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </span>
        <span class="sb-name">All Boards</span>
      </div>
      <div class="sb-item" onclick="showView('my')" id="sb-my">
        <span class="sb-icon">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <span class="sb-name">My Items</span>
      </div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-label">Boards</div>
      <div id="sb-boards"></div>
    </div>
    <div class="sidebar-bottom">
      <div class="sb-item" onclick="showNewBoardModal()">
        <span class="sb-icon" style="color:var(--accent)">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </span>
        <span class="sb-name" style="color:var(--accent)">Add Board</span>
      </div>
    </div>
  </div>

  <div id="main">
    <div id="board-header" style="display:none">
      <div class="board-title-row">
        <button class="board-icon-btn" id="board-icon-btn" onclick="pickBoardIcon()" title="Change icon"></button>
        <input class="board-name-input" id="board-name-input" onblur="renameCurBoard(this.value)" onkeydown="if(event.key==='Enter')this.blur()">
        <div style="flex:1"></div>
        <button class="tool-btn" onclick="deleteCurBoard()" style="border-color:var(--red-dim);color:var(--red)" title="Delete board">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Delete
        </button>
      </div>
      <div class="board-tabs">
        <div class="tab active" onclick="setTab('table',this)">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" style="display:inline-block;vertical-align:-2px;margin-right:5px"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          Table
        </div>
        <div class="tab" onclick="setTab('kanban',this)">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" style="display:inline-block;vertical-align:-2px;margin-right:5px"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
          Kanban
        </div>
      </div>
    </div>
    <div id="toolbar-area" style="display:none">
      <div id="toolbar">
        <button class="tool-btn" onclick="addGroup()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Group
        </button>
        <div style="flex:1"></div>
        <button class="tool-btn" onclick="toggleCollapse()" id="collapse-btn">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg>
          Collapse All
        </button>
      </div>
    </div>
    <div id="board-content"></div>
    <div id="all-boards-view" style="display:none;padding:28px 28px;overflow-y:auto;flex:1"></div>
  </div>
</div>

<!-- Dropdown -->
<div id="dropdown" class="dropdown" style="display:none"></div>
<!-- Modal backdrop -->
<div id="modal-backdrop" class="modal-backdrop" style="display:none" onclick="closeModal(event)"></div>
<!-- Modal content -->
<div id="modal-content" style="display:none"></div>

<script>
// ============================================================
// STATE
// ============================================================
const COLORS=['#e2445c','#00c875','#fdbc64','#a25ddc','#5b7cff','#03c9d0','#ff7b29','#ff5ac4','#0086c0','#66ccff'];
const ICONS=['📋','📊','🎯','🚀','💡','📁','🔥','⭐','🎨','🛠','📈','🌟'];
const STATUS_OPTIONS=[
  {label:'Not Started',color:'#676f9d',bg:'#1e2035'},
  {label:'In Progress',color:'#fdbc64',bg:'#3d2e10'},
  {label:'Working on it',color:'#ff7b29',bg:'#3d2008'},
  {label:'Done',color:'#00c875',bg:'#0a3d26'},
  {label:'Stuck',color:'#e2445c',bg:'#3d1220'},
  {label:'Review',color:'#a25ddc',bg:'#2d1845'},
  {label:'Cancelled',color:'#676f9d',bg:'#1e2035'},
];
const PRIORITY_OPTIONS=[
  {label:'Critical',color:'#e2445c',bg:'#3d1220'},
  {label:'High',color:'#ff7b29',bg:'#3d2008'},
  {label:'Medium',color:'#fdbc64',bg:'#3d2e10'},
  {label:'Low',color:'#00c875',bg:'#0a3d26'},
  {label:'None',color:'#676f9d',bg:'#1e2035'},
];

let state={
  boards:[],
  activeBoardId:null,
  currentView:'board',
  allCollapsed:false,
};

function genId(){return '_'+Math.random().toString(36).substr(2,9)}

function defaultBoard(name,icon){
  const gid1=genId(),gid2=genId(),gid3=genId();
  return{
    id:genId(),name,icon:icon||ICONS[Math.floor(Math.random()*ICONS.length)],
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    groups:[
      {id:gid1,name:'In Progress',color:'#5b7cff',collapsed:false,items:[
        {id:genId(),name:'Design new landing page',status:'In Progress',owner:'Alex Kim',dueDate:'2025-05-20',priority:'High',notes:'Coordinate with design team'},
        {id:genId(),name:'Set up CI/CD pipeline',status:'Working on it',owner:'Sam Park',dueDate:'2025-05-15',priority:'Medium',notes:''},
        {id:genId(),name:'User research interviews',status:'In Progress',owner:'Jordan Lee',dueDate:'2025-05-18',priority:'High',notes:'Schedule 5 sessions'},
      ]},
      {id:gid2,name:'Backlog',color:'#676f9d',collapsed:false,items:[
        {id:genId(),name:'Write API documentation',status:'Not Started',owner:'',dueDate:'',priority:'Low',notes:''},
        {id:genId(),name:'Performance optimization',status:'Not Started',owner:'Sam Park',dueDate:'2025-06-01',priority:'Medium',notes:'Target: <200ms load time'},
        {id:genId(),name:'A/B test homepage hero',status:'Not Started',owner:'Alex Kim',dueDate:'',priority:'Low',notes:''},
      ]},
      {id:gid3,name:'Done',color:'#00c875',collapsed:false,items:[
        {id:genId(),name:'Initial project setup',status:'Done',owner:'Sam Park',dueDate:'2025-04-30',priority:'High',notes:''},
        {id:genId(),name:'Stakeholder kickoff meeting',status:'Done',owner:'Jordan Lee',dueDate:'2025-04-28',priority:'Medium',notes:'Notes shared in Slack'},
      ]},
    ]
  };
}

function defaultBoard2(){
  return{
    id:genId(),name:'Product Roadmap',icon:'🗺',
    color:'#00c875',
    groups:[
      {id:genId(),name:'Q2 2025',color:'#5b7cff',collapsed:false,items:[
        {id:genId(),name:'Launch mobile app v2',status:'In Progress',owner:'Alex Kim',dueDate:'2025-06-15',priority:'Critical',notes:''},
        {id:genId(),name:'Onboarding redesign',status:'Review',owner:'Jordan Lee',dueDate:'2025-05-30',priority:'High',notes:''},
      ]},
      {id:genId(),name:'Q3 2025',color:'#a25ddc',collapsed:false,items:[
        {id:genId(),name:'Enterprise SSO',status:'Not Started',owner:'',dueDate:'2025-08-01',priority:'High',notes:''},
        {id:genId(),name:'Analytics dashboard v2',status:'Not Started',owner:'Sam Park',dueDate:'2025-09-01',priority:'Medium',notes:''},
      ]},
    ]
  };
}

function loadState(){
  try{const s=localStorage.getItem('workboard_v2');if(s){state=JSON.parse(s);return;}}catch(e){}
  state.boards=[defaultBoard('Marketing Sprint','📋'),defaultBoard2()];
  state.activeBoardId=state.boards[0].id;
  saveState();
}
function saveState(){try{localStorage.setItem('workboard_v2',JSON.stringify(state));}catch(e){}}

function getBoard(id){return state.boards.find(b=>b.id===id)}
function getCurBoard(){return getBoard(state.activeBoardId)}
function getGroup(board,gid){return board&&board.groups.find(g=>g.id===gid)}
function getItem(group,iid){return group&&group.items.find(i=>i.id===iid)}
function getStatusOpt(label){return STATUS_OPTIONS.find(s=>s.label===label)||STATUS_OPTIONS[0]}
function getPriorityOpt(label){return PRIORITY_OPTIONS.find(p=>p.label===label)||PRIORITY_OPTIONS[4]}

// ============================================================
// RENDER
// ============================================================
function renderAll(){
  renderSidebar();
  if(state.currentView==='all'){showAllBoards();return;}
  const board=getCurBoard();
  if(!board){document.getElementById('board-content').innerHTML='<div class="empty-state"><div class="empty-state-icon">📋</div><p>Select or create a board to get started.</p></div>';document.getElementById('board-header').style.display='none';document.getElementById('toolbar-area').style.display='none';return;}
  document.getElementById('board-header').style.display='';
  document.getElementById('toolbar-area').style.display='';
  document.getElementById('board-icon-btn').textContent=board.icon;
  document.getElementById('board-name-input').value=board.name;
  if(state.currentTab==='kanban'){renderKanban(board);}else{renderTable(board);}
}

function renderSidebar(){
  const container=document.getElementById('sb-boards');
  container.innerHTML=state.boards.map(b=>{
    const total=b.groups.reduce((a,g)=>a+g.items.length,0);
    return`<div class="sb-item${b.id===state.activeBoardId?' active':''}" onclick="selectBoard('${b.id}')">
      <span class="sb-icon">${b.icon}</span>
      <span class="sb-name">${esc(b.name)}</span>
      <span class="sb-count">${total}</span>
    </div>`;
  }).join('');
  document.getElementById('sb-all').classList.toggle('active',state.currentView==='all');
  document.getElementById('sb-my').classList.toggle('active',state.currentView==='my');
}

function renderTable(board){
  const content=document.getElementById('board-content');
  const searchQ=(document.getElementById('global-search').value||'').toLowerCase();
  const html=board.groups.map(g=>{
    const items=searchQ?g.items.filter(i=>i.name.toLowerCase().includes(searchQ)||i.owner.toLowerCase().includes(searchQ)):g.items;
    const doneCount=items.filter(i=>i.status==='Done').length;
    const progressHtml=buildProgressBar(items);
    return`<div class="group${g.collapsed?' collapsed':''}" data-gid="${g.id}">
      <div class="group-header">
        <div class="group-color" style="background:${g.color};min-height:32px"></div>
        <button class="group-toggle" onclick="toggleGroup('${board.id}','${g.id}')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="transform:${g.collapsed?'rotate(-90deg)':'rotate(0)'};transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <input class="group-name-input" value="${esc(g.name)}" onblur="renameGroup('${board.id}','${g.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
        <span class="group-count">${items.length}</span>
        <div class="group-progress">${progressHtml}</div>
        <div class="group-actions">
          <button class="g-action-btn" onclick="changeGroupColor('${board.id}','${g.id}',event)" title="Color">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="g-action-btn" onclick="deleteGroup('${board.id}','${g.id}')" title="Delete group" style="color:var(--red)">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="group-table-wrap">
      <table class="group-table">
        <thead class="col-headers">
          <tr>
            <th style="border-left:3px solid ${g.color}">Item</th>
            <th style="text-align:center">Status</th>
            <th style="text-align:center">Priority</th>
            <th>Owner</th>
            <th>Due Date</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item=>renderItemRow(board.id,g.id,item,g.color)).join('')}
          <tr class="add-row"><td colspan="7">
            <button class="add-item-btn" onclick="addItem('${board.id}','${g.id}')">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Item
            </button>
          </td></tr>
        </tbody>
      </table>
      </div>
    </div>`;
  }).join('');
  content.innerHTML=html||'<div class="empty-state"><div class="empty-state-icon">📦</div><p>No groups yet. Add one above!</p></div>';
}

function buildProgressBar(items){
  if(!items.length)return'';
  const counts={};
  items.forEach(i=>{counts[i.status]=(counts[i.status]||0)+1;});
  return Object.entries(counts).map(([s,c])=>{
    const opt=getStatusOpt(s);
    const w=Math.round(c/items.length*100);
    return`<div class="gp-seg" style="width:${w}%;background:${opt.color};flex:${c}"></div>`;
  }).join('');
}

function renderItemRow(bid,gid,item,groupColor){
  const st=getStatusOpt(item.status);
  const pr=getPriorityOpt(item.priority||'None');
  const isOverdue=item.dueDate&&new Date(item.dueDate)<new Date()&&item.status!=='Done';
  const initials=item.owner?item.owner.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase():'';
  const avatarColor=item.owner?COLORS[Math.abs(hashStr(item.owner))%COLORS.length]:'var(--border2)';
  return`<tr class="item-row" data-bid="${bid}" data-gid="${gid}" data-iid="${item.id}">
    <td class="cell-name" style="border-left:3px solid ${groupColor}">
      <div class="name-wrap">
        <span class="row-drag">⠿</span>
        <input class="name-input" value="${esc(item.name)}" placeholder="Item name..."
          onblur="updateItem('${bid}','${gid}','${item.id}','name',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
          onclick="event.stopPropagation()">
        <button class="open-btn" onclick="openItemDetail('${bid}','${gid}','${item.id}');event.stopPropagation()" title="Open detail">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
      </div>
    </td>
    <td class="cell-status">
      <span class="status-badge" style="background:${st.bg};color:${st.color}"
        onclick="showStatusPicker('${bid}','${gid}','${item.id}',event)">${esc(item.status)}</span>
    </td>
    <td class="cell-priority">
      <span class="priority-badge" style="background:${pr.bg};color:${pr.color}"
        onclick="showPriorityPicker('${bid}','${gid}','${item.id}',event)">
        <span class="priority-dot" style="background:${pr.color}"></span>
        ${esc(item.priority||'None')}
      </span>
    </td>
    <td class="cell-owner">
      <div class="owner-wrap">
        <div class="owner-avatar" style="background:${initials?avatarColor+'33':''};color:${avatarColor}">${initials}</div>
        <input class="owner-input" value="${esc(item.owner)}" placeholder="Assign..."
          onblur="updateItem('${bid}','${gid}','${item.id}','owner',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
          onclick="event.stopPropagation()">
      </div>
    </td>
    <td class="cell-date">
      <input type="date" class="date-input${isOverdue?' date-overdue':''}" value="${item.dueDate||''}"
        onchange="updateItem('${bid}','${gid}','${item.id}','dueDate',this.value)"
        onclick="event.stopPropagation()">
    </td>
    <td class="cell-notes">
      <input class="notes-input" value="${esc(item.notes||'')}" placeholder="Add note..."
        onblur="updateItem('${bid}','${gid}','${item.id}','notes',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()"
        onclick="event.stopPropagation()">
    </td>
    <td class="cell-actions">
      <button class="row-action-btn" onclick="deleteItem('${bid}','${gid}','${item.id}');event.stopPropagation()" title="Delete">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </td>
  </tr>`;
}

function renderKanban(board){
  const content=document.getElementById('board-content');
  const cols=['Not Started','In Progress','Working on it','Review','Done','Stuck'];
  const html=`<div style="display:flex;gap:16px;overflow-x:auto;padding:16px 0;min-height:400px">
    ${cols.map(col=>{
      const st=getStatusOpt(col);
      const allItems=board.groups.flatMap(g=>g.items.filter(i=>i.status===col).map(i=>({...i,_gid:g.id})));
      return`<div style="flex-shrink:0;width:260px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:6px 10px;background:${st.bg};border-radius:8px">
          <span style="width:10px;height:10px;border-radius:50%;background:${st.color};display:inline-block"></span>
          <span style="font-size:13px;font-weight:600;color:${st.color}">${col}</span>
          <span style="font-size:11px;color:${st.color};opacity:.7;margin-left:auto">${allItems.length}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${allItems.map(item=>`
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px;cursor:pointer" onclick="openItemDetail('${board.id}','${item._gid}','${item.id}')">
              <div style="font-size:13.5px;font-weight:500;margin-bottom:8px;color:var(--text)">${esc(item.name)}</div>
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                ${item.priority&&item.priority!=='None'?`<span style="font-size:11px;padding:2px 7px;border-radius:4px;background:${getPriorityOpt(item.priority).bg};color:${getPriorityOpt(item.priority).color}">${item.priority}</span>`:''}
                ${item.dueDate?`<span style="font-size:11px;color:var(--text3);margin-left:auto">${formatDate(item.dueDate)}</span>`:''}
              </div>
              ${item.owner?`<div style="font-size:12px;color:var(--text3);margin-top:6px">👤 ${esc(item.owner)}</div>`:''}
            </div>`).join('')}
          <button onclick="addItemKanban('${board.id}','${col}')" style="background:none;border:1px dashed var(--border);border-radius:9px;padding:10px;color:var(--text3);font-size:13px;cursor:pointer;font-family:inherit;transition:all .12s;width:100%" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text3)'">+ Add item</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
  content.innerHTML=html;
}

function showAllBoards(){
  document.getElementById('board-header').style.display='none';
  document.getElementById('toolbar-area').style.display='none';
  document.getElementById('board-content').innerHTML='';
  const v=document.getElementById('all-boards-view');
  v.style.display='';
  v.style.flex='1';
  v.style.overflowY='auto';
  const html=`<h2 style="font-size:20px;font-weight:600;margin-bottom:20px;color:var(--text)">All Boards</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">
      ${state.boards.map(b=>{
        const total=b.groups.reduce((a,g)=>a+g.items.length,0);
        const done=b.groups.reduce((a,g)=>a+g.items.filter(i=>i.status==='Done').length,0);
        const pct=total?Math.round(done/total*100):0;
        return`<div onclick="selectBoard('${b.id}')" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .15s,transform .15s" onmouseover="this.style.borderColor=this.style.color='var(--border2)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
          <div style="font-size:28px;margin-bottom:8px">${b.icon}</div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">${esc(b.name)}</div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:12px">${total} items · ${b.groups.length} groups</div>
          <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:var(--green);border-radius:2px;transition:width .3s"></div>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:5px">${pct}% complete</div>
        </div>`;
      }).join('')}
      <div onclick="showNewBoardModal()" style="background:none;border:1px dashed var(--border);border-radius:12px;padding:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;transition:border-color .15s,color .15s;color:var(--text3)" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text3)'">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span style="font-size:13px">New Board</span>
      </div>
    </div>`;
  v.innerHTML=html;
}

// ============================================================
// ACTIONS
// ============================================================
function selectBoard(id){
  state.activeBoardId=id;
  state.currentView='board';
  document.getElementById('all-boards-view').style.display='none';
  saveState();renderAll();
}
function showView(v){
  state.currentView=v;
  if(v==='all'){showAllBoards();renderSidebar();return;}
  if(v==='my'){renderMyItems();return;}
  renderAll();
}
function renderMyItems(){
  // find items assigned to "me" - just show all unassigned + highlight
  document.getElementById('board-header').style.display='none';
  document.getElementById('toolbar-area').style.display='none';
  document.getElementById('all-boards-view').style.display='none';
  const content=document.getElementById('board-content');
  const allItems=[];
  state.boards.forEach(b=>b.groups.forEach(g=>g.items.forEach(i=>{if(i.owner)allItems.push({...i,boardName:b.name,boardIcon:b.icon,groupName:g.name,bid:b.id,gid:g.id});})));
  if(!allItems.length){content.innerHTML='<div class="empty-state"><div class="empty-state-icon">👤</div><p>No assigned items found.</p></div>';return;}
  const owners=[...new Set(allItems.map(i=>i.owner))].sort();
  content.innerHTML=`<div style="padding:16px 0">
    <h2 style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:16px">My Items</h2>
    ${owners.map(owner=>`
      <div style="margin-bottom:24px">
        <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:8px">
          <div style="width:26px;height:26px;border-radius:50%;background:${COLORS[Math.abs(hashStr(owner))%COLORS.length]}33;color:${COLORS[Math.abs(hashStr(owner))%COLORS.length]};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${owner.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}</div>
          ${esc(owner)}
        </div>
        <table class="group-table"><thead class="col-headers"><tr>
          <th style="padding-left:12px">Item</th><th style="text-align:center">Status</th><th style="text-align:center">Priority</th><th>Board</th><th>Due Date</th>
        </tr></thead><tbody>
        ${allItems.filter(i=>i.owner===owner).map(item=>{
          const st=getStatusOpt(item.status);
          const pr=getPriorityOpt(item.priority||'None');
          const isOverdue=item.dueDate&&new Date(item.dueDate)<new Date()&&item.status!=='Done';
          return`<tr class="item-row" onclick="selectBoard('${item.bid}')">
            <td class="cell-name" style="border-left:3px solid var(--accent)"><div class="name-wrap"><span style="font-size:13.5px;color:var(--text);padding:4px">${esc(item.name)}</span></div></td>
            <td class="cell-status"><span class="status-badge" style="background:${st.bg};color:${st.color}">${esc(item.status)}</span></td>
            <td class="cell-priority"><span class="priority-badge" style="background:${pr.bg};color:${pr.color}"><span class="priority-dot" style="background:${pr.color}"></span>${esc(item.priority||'None')}</span></td>
            <td style="padding:6px 10px;font-size:13px;color:var(--text2)">${item.boardIcon} ${esc(item.boardName)}</td>
            <td class="cell-date" style="padding:6px 10px;font-size:13px;${isOverdue?'color:var(--red)':''}">${item.dueDate?formatDate(item.dueDate):''}</td>
          </tr>`;
        }).join('')}
        </tbody></table>
      </div>`).join('')}
  </div>`;
  renderSidebar();
}

function setTab(tab,el){
  state.currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const board=getCurBoard();
  if(board){tab==='kanban'?renderKanban(board):renderTable(board);}
}

function renameCurBoard(name){
  const b=getCurBoard();if(!b)return;
  b.name=name.trim()||b.name;
  saveState();renderSidebar();
}
function renameGroup(bid,gid,name){
  const b=getBoard(bid);const g=getGroup(b,gid);if(!g)return;
  g.name=name.trim()||g.name;
  saveState();renderSidebar();
}
function toggleGroup(bid,gid){
  const b=getBoard(bid);const g=getGroup(b,gid);if(!g)return;
  g.collapsed=!g.collapsed;
  saveState();renderTable(b);
}
function toggleCollapse(){
  const b=getCurBoard();if(!b)return;
  state.allCollapsed=!state.allCollapsed;
  b.groups.forEach(g=>g.collapsed=state.allCollapsed);
  document.getElementById('collapse-btn').innerHTML=state.allCollapsed?
    `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg> Expand All`:
    `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg> Collapse All`;
  saveState();renderTable(b);
}
function updateItem(bid,gid,iid,field,value){
  const b=getBoard(bid);const g=getGroup(b,gid);const item=getItem(g,iid);if(!item)return;
  item[field]=value;
  saveState();
  // re-render just sidebar count
  renderSidebar();
  // re-render progress bar for this group
  const groupEl=document.querySelector(`[data-gid="${gid}"]`);
  if(groupEl){
    const pg=groupEl.querySelector('.group-progress');
    if(pg)pg.innerHTML=buildProgressBar(g.items);
  }
}
function addItem(bid,gid){
  const b=getBoard(bid);const g=getGroup(b,gid);if(!g)return;
  const item={id:genId(),name:'New item',status:'Not Started',owner:'',dueDate:'',priority:'None',notes:''};
  g.items.push(item);
  saveState();renderTable(b);
  // focus the name input of the new row
  setTimeout(()=>{
    const rows=document.querySelectorAll(`[data-gid="${gid}"] .item-row`);
    const last=rows[rows.length-1];
    if(last){const inp=last.querySelector('.name-input');if(inp){inp.select();}}
  },50);
}
function addItemKanban(bid,status){
  const b=getBoard(bid);if(!b||!b.groups.length)return;
  const g=b.groups[0];
  const item={id:genId(),name:'New item',status,owner:'',dueDate:'',priority:'None',notes:''};
  g.items.push(item);
  saveState();renderKanban(b);
}
function deleteItem(bid,gid,iid){
  const b=getBoard(bid);const g=getGroup(b,gid);if(!g)return;
  g.items=g.items.filter(i=>i.id!==iid);
  saveState();renderTable(b);
}
function addGroup(){
  const b=getCurBoard();if(!b)return;
  const colors=['#5b7cff','#e2445c','#00c875','#a25ddc','#fdbc64','#03c9d0'];
  const g={id:genId(),name:'New Group',color:colors[b.groups.length%colors.length],collapsed:false,items:[]};
  b.groups.push(g);
  saveState();renderAll();
  setTimeout(()=>{
    const inputs=document.querySelectorAll('.group-name-input');
    const last=inputs[inputs.length-1];
    if(last){last.focus();last.select();}
  },50);
}
function deleteGroup(bid,gid){
  const b=getBoard(bid);if(!b)return;
  if(!confirm('Delete this group and all its items?'))return;
  b.groups=b.groups.filter(g=>g.id!==gid);
  saveState();renderAll();
}
function changeGroupColor(bid,gid,e){
  e.stopPropagation();
  const b=getBoard(bid);const g=getGroup(b,gid);if(!g)return;
  const html=`<div style="padding:6px 8px"><div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600;text-transform:uppercase">Group Color</div>
    <div class="color-swatch-row">${COLORS.map(c=>`<div class="color-swatch${g.color===c?' sel':''}" style="background:${c}" onclick="setGroupColor('${bid}','${gid}','${c}')"></div>`).join('')}</div></div>`;
  showDropdown(html,e);
}
function setGroupColor(bid,gid,color){
  const b=getBoard(bid);const g=getGroup(b,gid);if(!g)return;
  g.color=color;saveState();closeDropdown();renderTable(b);
}
function deleteCurBoard(){
  if(state.boards.length<=1){showToast('Cannot delete the last board');return;}
  if(!confirm('Delete this board and all its data?'))return;
  state.boards=state.boards.filter(b=>b.id!==state.activeBoardId);
  state.activeBoardId=state.boards[0].id;
  saveState();renderAll();
}
function pickBoardIcon(){
  const board=getCurBoard();if(!board)return;
  const el=document.getElementById('board-icon-btn');
  const rect=el.getBoundingClientRect();
  const html=`<div style="padding:6px 8px"><div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600;text-transform:uppercase">Board Icon</div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px">${ICONS.map(ic=>`<div style="font-size:20px;padding:4px;border-radius:5px;cursor:pointer;text-align:center" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background=''" onclick="setBoardIcon('${ic}')">${ic}</div>`).join('')}</div></div>`;
  const dd=document.getElementById('dropdown');
  dd.innerHTML=html;dd.style.display='';
  dd.style.top=(rect.bottom+4)+'px';
  dd.style.left=rect.left+'px';
}
function setBoardIcon(icon){
  const b=getCurBoard();if(!b)return;
  b.icon=icon;saveState();closeDropdown();
  document.getElementById('board-icon-btn').textContent=icon;
  renderSidebar();
}

// ============================================================
// STATUS / PRIORITY PICKERS
// ============================================================
function showStatusPicker(bid,gid,iid,e){
  e.stopPropagation();
  const html=STATUS_OPTIONS.map(s=>`
    <div class="dd-item" onclick="setStatus('${bid}','${gid}','${iid}','${s.label}')">
      <span class="dd-swatch" style="background:${s.color}"></span>${s.label}
    </div>`).join('');
  showDropdown(html,e);
}
function setStatus(bid,gid,iid,status){
  updateItem(bid,gid,iid,'status',status);
  closeDropdown();
  // update badge in-place
  const row=document.querySelector(`[data-iid="${iid}"]`);
  if(row){
    const badge=row.querySelector('.status-badge');
    if(badge){const st=getStatusOpt(status);badge.style.background=st.bg;badge.style.color=st.color;badge.textContent=status;}
  }
}
function showPriorityPicker(bid,gid,iid,e){
  e.stopPropagation();
  const html=PRIORITY_OPTIONS.map(p=>`
    <div class="dd-item" onclick="setPriority('${bid}','${gid}','${iid}','${p.label}')">
      <span class="dd-swatch" style="background:${p.color};border-radius:50%"></span>${p.label}
    </div>`).join('');
  showDropdown(html,e);
}
function setPriority(bid,gid,iid,priority){
  updateItem(bid,gid,iid,'priority',priority);
  closeDropdown();
  const row=document.querySelector(`[data-iid="${iid}"]`);
  if(row){
    const badge=row.querySelector('.priority-badge');
    if(badge){
      const pr=getPriorityOpt(priority);
      badge.style.background=pr.bg;badge.style.color=pr.color;
      badge.querySelector('.priority-dot').style.background=pr.color;
      badge.childNodes[badge.childNodes.length-1].textContent=' '+priority;
    }
  }
}

// ============================================================
// ITEM DETAIL MODAL
// ============================================================
function openItemDetail(bid,gid,iid){
  const b=getBoard(bid);const g=getGroup(b,gid);const item=getItem(g,iid);if(!item)return;
  const html=`<div class="item-detail" onclick="event.stopPropagation()">
    <div class="detail-header">
      <input class="detail-title-input" id="dt-name" value="${esc(item.name)}" placeholder="Item name...">
      <button class="detail-close" onclick="closeModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="detail-fields">
      <div class="detail-field">
        <label>Status</label>
        <select id="dt-status" onchange="updateItem('${bid}','${gid}','${iid}','status',this.value)">
          ${STATUS_OPTIONS.map(s=>`<option${item.status===s.label?' selected':''}>${s.label}</option>`).join('')}
        </select>
      </div>
      <div class="detail-field">
        <label>Priority</label>
        <select id="dt-priority" onchange="updateItem('${bid}','${gid}','${iid}','priority',this.value)">
          ${PRIORITY_OPTIONS.map(p=>`<option${(item.priority||'None')===p.label?' selected':''}>${p.label}</option>`).join('')}
        </select>
      </div>
      <div class="detail-field">
        <label>Owner</label>
        <input type="text" id="dt-owner" value="${esc(item.owner)}" placeholder="Assign to...">
      </div>
      <div class="detail-field">
        <label>Due Date</label>
        <input type="date" id="dt-due" value="${item.dueDate||''}">
      </div>
      <div class="detail-field detail-notes-full">
        <label>Notes</label>
        <textarea id="dt-notes" placeholder="Add notes...">${esc(item.notes||'')}</textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Close</button>
      <button class="modal-ok" onclick="saveDetailModal('${bid}','${gid}','${iid}')">Save</button>
    </div>
  </div>`;
  showModal(html);
}
function saveDetailModal(bid,gid,iid){
  const updates={
    name:document.getElementById('dt-name').value,
    status:document.getElementById('dt-status').value,
    priority:document.getElementById('dt-priority').value,
    owner:document.getElementById('dt-owner').value,
    dueDate:document.getElementById('dt-due').value,
    notes:document.getElementById('dt-notes').value,
  };
  const b=getBoard(bid);const g=getGroup(b,gid);const item=getItem(g,iid);if(!item)return;
  Object.assign(item,updates);
  saveState();closeModal();renderTable(b);
}

// ============================================================
// NEW BOARD MODAL
// ============================================================
function showNewBoardModal(){
  const html=`<div class="modal" onclick="event.stopPropagation()">
    <h3>Create New Board</h3>
    <div class="modal-row">
      <label>Board Name</label>
      <input type="text" id="nb-name" placeholder="e.g. Q2 Campaign" autofocus>
    </div>
    <div class="modal-row">
      <label>Icon</label>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:4px 0" id="nb-icons">
        ${ICONS.map((ic,idx)=>`<div class="nb-icon${idx===0?' nb-icon-sel':''}" data-ic="${ic}" onclick="selectNewBoardIcon(this)" style="font-size:20px;padding:6px;border-radius:6px;cursor:pointer;text-align:center;border:1.5px solid ${idx===0?'var(--accent)':'var(--border)'};transition:border-color .12s">${ic}</div>`).join('')}
      </div>
    </div>
    <div class="modal-row">
      <label>Start with template</label>
      <select id="nb-template">
        <option value="default">Project Template (with sample data)</option>
        <option value="blank">Blank Board</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-ok" onclick="createNewBoard()">Create Board</button>
    </div>
  </div>`;
  showModal(html);
  setTimeout(()=>{const inp=document.getElementById('nb-name');if(inp)inp.focus();},50);
}
function selectNewBoardIcon(el){
  document.querySelectorAll('.nb-icon').forEach(e=>{e.style.borderColor='var(--border)';e.classList.remove('nb-icon-sel');});
  el.style.borderColor='var(--accent)';el.classList.add('nb-icon-sel');
}
function createNewBoard(){
  const name=(document.getElementById('nb-name').value||'').trim();
  if(!name){showToast('Please enter a board name');return;}
  const iconEl=document.querySelector('.nb-icon-sel');
  const icon=iconEl?iconEl.dataset.ic:ICONS[0];
  const template=document.getElementById('nb-template').value;
  let board;
  if(template==='blank'){
    board={id:genId(),name,icon,color:COLORS[state.boards.length%COLORS.length],groups:[
      {id:genId(),name:'Group 1',color:'#5b7cff',collapsed:false,items:[]}
    ]};
  } else {
    board=defaultBoard(name,icon);
  }
  state.boards.push(board);
  state.activeBoardId=board.id;
  state.currentView='board';
  saveState();closeModal();renderAll();
  showToast(`Board "${name}" created!`);
}

// ============================================================
// SEARCH
// ============================================================
function handleSearch(q){
  const board=getCurBoard();
  if(board&&state.currentView==='board'&&state.currentTab!=='kanban')renderTable(board);
}

// ============================================================
// DROPDOWN HELPERS
// ============================================================
function showDropdown(html,e){
  const dd=document.getElementById('dropdown');
  dd.innerHTML=html;dd.style.display='';
  const rect=e.target.getBoundingClientRect();
  let top=rect.bottom+4,left=rect.left;
  if(top+200>window.innerHeight)top=rect.top-204;
  if(left+200>window.innerWidth)left=window.innerWidth-210;
  dd.style.top=top+'px';dd.style.left=left+'px';
  dd.style.maxHeight='300px';dd.style.overflowY='auto';
}
function closeDropdown(){const dd=document.getElementById('dropdown');dd.style.display='none';}
document.addEventListener('click',e=>{if(!e.target.closest('#dropdown'))closeDropdown();});

// ============================================================
// MODAL HELPERS
// ============================================================
function showModal(html){
  const bd=document.getElementById('modal-backdrop');
  const mc=document.getElementById('modal-content');
  bd.style.display='flex';
  bd.innerHTML=html;
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-backdrop'))return;
  document.getElementById('modal-backdrop').style.display='none';
  document.getElementById('modal-backdrop').innerHTML='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal({target:document.getElementById('modal-backdrop')});});

// ============================================================
// TOAST
// ============================================================
function showToast(msg,dur=2500){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(8px)';t.style.transition='all .25s';setTimeout(()=>t.remove(),300);},dur);
}

// ============================================================
// UTILS
// ============================================================
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return Math.abs(h);}
function formatDate(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

// ============================================================
// INIT
// ============================================================
loadState();
renderAll();
</script>
